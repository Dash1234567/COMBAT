<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>AI Coach · COMBAT</title>
  <meta name="description" content="Chat with the COMBAT AI Coach — nutrition, endurance, strength, weight cutting and mindset, tuned to your sport." />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Crect width='100' height='100' rx='24' fill='%23ff4b4b'/%3E%3Ctext x='50' y='54' font-size='60' font-family='Arial,sans-serif' font-weight='bold' fill='white' text-anchor='middle' dominant-baseline='central'%3EC%3C/text%3E%3C/svg%3E" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/styles.css" />
</head>
<body>
  <header class="hotbar">
    <div class="hotbar__inner">
      <a class="brand" href="/" aria-label="COMBAT home">
        <span class="brand__badge" aria-hidden="true">🥊</span>
        <span class="brand__name">COMBAT</span>
      </a>
      <nav class="nav" aria-label="Primary">
        <div class="nav__links">
          <a class="navlink" href="/">Home</a>
          <a class="navlink" href="/plans.html">My Plans</a>
          <a class="navlink" href="/coach.html">AI Coach</a>
        </div>
        <a class="btn btn--red btn--sm" href="/create.html">Create Plan</a>
        <button class="nav__toggle" aria-label="Menu" aria-expanded="false">☰</button>
      </nav>
    </div>
  </header>

  <main class="page">
    <div class="container">
      <div class="card coach-head">
        <h1>🥊 AI Coach</h1>
        <p class="coach-sub">Your sports nutritionist, endurance coach and strength coach in one — tuned to your sport.</p>
        <div class="coach-controls">
          <div class="segmented" id="sportSeg" role="tablist" aria-label="Sport">
            <button type="button" data-sport="wrestling" role="tab">🤼 Wrestling</button>
            <button type="button" data-sport="boxing" role="tab">🥊 Boxing</button>
            <button type="button" data-sport="general" role="tab">🧠 General</button>
          </div>
          <button class="btn btn--ghost btn--sm" id="learnBtn" type="button" aria-expanded="false">Who I learn from</button>
        </div>
        <div id="coachLearn" class="coach-learn hidden"></div>
      </div>

      <section class="chat" aria-label="Coach chat">
        <div class="chat-log" id="chatLog" aria-live="polite"></div>
        <div class="suggestions" id="suggestions"></div>
        <form class="composer" id="chatForm">
          <input class="input" id="chatInput" autocomplete="off" placeholder="Ask your coach anything…" aria-label="Message" />
          <button class="btn btn--blue" type="submit">Send</button>
        </form>
        <p class="coach-disclaimer">General training guidance — always train and cut weight under qualified supervision.</p>
      </section>
    </div>
  </main>

  <script type="module" src="/js/coach.js"></script>
</body>
</html>
